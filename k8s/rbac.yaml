---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inovatech-sa
  namespace: inovatech

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: inovatech-role
  namespace: inovatech
rules:
- apiGroups: [""]
  resources: ["pods", "pods/logs", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: inovatech-rolebinding
  namespace: inovatech
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: inovatech-role
subjects:
- kind: ServiceAccount
  name: inovatech-sa
  namespace: inovatech
