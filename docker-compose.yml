# Docker Compose para desarrollo local

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: inovatech-mysql
    environment:
      MYSQL_ROOT_PASSWORD: inovatech123
      MYSQL_DATABASE: inovatech
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pinovatech123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inovatech-network

  products-service:
    build:
      context: ./backend-products
    container_name: inovatech-products
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: inovatech123
      DB_NAME: inovatech
      NODE_ENV: development
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - inovatech-network
    restart: unless-stopped

  orders-service:
    build:
      context: ./backend-orders
    container_name: inovatech-orders
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: inovatech123
      DB_NAME: inovatech
      PRODUCTS_SERVICE: http://products-service:3001
      NODE_ENV: development
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - inovatech-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: inovatech-frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost
    depends_on:
      - products-service
      - orders-service
    networks:
      - inovatech-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  inovatech-network:
    driver: bridge
