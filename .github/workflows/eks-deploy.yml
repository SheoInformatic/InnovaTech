name: Build and Deploy to EKS

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend-products/**'
      - 'backend-orders/**'
      - 'frontend/**'
      - 'k8s/**'
      - '.github/workflows/eks-deploy.yml'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: inovatech-cluster
  NAMESPACE: inovatech

jobs:
  build-and-push:
    name: Build and Push Images to ECR
    runs-on: self-hosted
    outputs:
      products-image: ${{ steps.images.outputs.products }}
      orders-image: ${{ steps.images.outputs.orders }}
      frontend-image: ${{ steps.images.outputs.frontend }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      run: |
        aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws configure set aws_session_token ${{ secrets.AWS_SESSION_TOKEN }}
        aws configure set region us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push Products image
      id: build-products
      env:
        ECR_REPOSITORY: inovatech/products
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest backend-products/
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "products=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Build and push Orders image
      id: build-orders
      env:
        ECR_REPOSITORY: inovatech/orders
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest backend-orders/
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "orders=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Build and push Frontend image
      id: build-frontend
      env:
        ECR_REPOSITORY: inovatech/frontend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build --no-cache -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest frontend/
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "frontend=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Store image URIs
      id: images
      run: |
        echo "products=${{ steps.build-products.outputs.products }}" >> $GITHUB_OUTPUT
        echo "orders=${{ steps.build-orders.outputs.orders }}" >> $GITHUB_OUTPUT
        echo "frontend=${{ steps.build-frontend.outputs.frontend }}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to EKS
    needs: build-and-push
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: Deploy manifests
      run: |
        kubectl apply -f k8s/configmap.yaml
        kubectl apply -f k8s/secret.yaml
        kubectl apply -f k8s/mysql-init-configmap.yaml
        kubectl apply -f k8s/mysql.yaml
        kubectl apply -f k8s/products-deployment.yaml
        kubectl apply -f k8s/orders-deployment.yaml
        kubectl apply -f k8s/frontend-deployment.yaml
        kubectl apply -f k8s/hpa.yaml

    - name: Update images
      run: |
        kubectl set image deployment/products-service products-service=${{ env.ECR_REGISTRY }}/inovatech/products:latest -n ${{ env.NAMESPACE }}
        kubectl set image deployment/orders-service orders-service=${{ env.ECR_REGISTRY }}/inovatech/orders:latest -n ${{ env.NAMESPACE }}
        kubectl set image deployment/frontend frontend=${{ env.ECR_REGISTRY }}/inovatech/frontend:latest -n ${{ env.NAMESPACE }}

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/products-service -n ${{ env.NAMESPACE }} --timeout=5m
        kubectl rollout status deployment/orders-service -n ${{ env.NAMESPACE }} --timeout=5m
        kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=5m

    - name: Get service endpoints
      run: |
        kubectl get svc -n ${{ env.NAMESPACE }}
        kubectl get deployments -n ${{ env.NAMESPACE }}
        kubectl get pods -n ${{ env.NAMESPACE }}