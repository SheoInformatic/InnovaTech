name: Build and Deploy to EKS

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend-products/**'
      - 'backend-orders/**'
      - 'frontend/**'
      - 'k8s/**'
      - '.github/workflows/eks-deploy.yml'

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: inovatech-cluster
  NAMESPACE: inovatech
  DOCKERHUB_REPO: sheocontainer

jobs:
  build-and-push:
    name: Build and Push Images to Docker Hub
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build and push Products image
      run: |
        docker build -t $DOCKERHUB_REPO/inovatech-products:latest backend-products/
        docker push $DOCKERHUB_REPO/inovatech-products:latest

    - name: Build and push Orders image
      run: |
        docker build -t $DOCKERHUB_REPO/inovatech-orders:latest backend-orders/
        docker push $DOCKERHUB_REPO/inovatech-orders:latest

    - name: Build and push Frontend image
      run: |
        docker build --no-cache -t $DOCKERHUB_REPO/inovatech-frontend:latest frontend/
        docker push $DOCKERHUB_REPO/inovatech-frontend:latest

  deploy:
    name: Deploy to EKS
    needs: build-and-push
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      run: |
        aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws configure set aws_session_token ${{ secrets.AWS_SESSION_TOKEN }}
        aws configure set region us-east-1

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: Deploy manifests
      run: |
        kubectl apply -f k8s/configmap.yaml
        kubectl apply -f k8s/secret.yaml
        kubectl apply -f k8s/mysql-init-configmap.yaml
        kubectl apply -f k8s/mysql.yaml
        kubectl apply -f k8s/products-deployment.yaml
        kubectl apply -f k8s/orders-deployment.yaml
        kubectl apply -f k8s/frontend-deployment.yaml
        kubectl apply -f k8s/hpa.yaml

    - name: Update images
      run: |
        kubectl set image deployment/products-service products-service=$DOCKERHUB_REPO/inovatech-products:latest -n ${{ env.NAMESPACE }}
        kubectl set image deployment/orders-service orders-service=$DOCKERHUB_REPO/inovatech-orders:latest -n ${{ env.NAMESPACE }}
        kubectl set image deployment/frontend frontend=$DOCKERHUB_REPO/inovatech-frontend:latest -n ${{ env.NAMESPACE }}

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/products-service -n ${{ env.NAMESPACE }} --timeout=5m
        kubectl rollout status deployment/orders-service -n ${{ env.NAMESPACE }} --timeout=5m
        kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=5m

    - name: Get service endpoints
      run: |
        kubectl get svc -n ${{ env.NAMESPACE }}
        kubectl get deployments -n ${{ env.NAMESPACE }}
        kubectl get pods -n ${{ env.NAMESPACE }}