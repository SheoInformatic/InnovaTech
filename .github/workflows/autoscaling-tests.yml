name: Autoscaling Tests

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Load test duration in seconds'
        required: false
        default: '300'

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: inovatech-cluster
  NAMESPACE: inovatech

jobs:
  load-test:
    name: Run Load Test and Monitor Autoscaling
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: Get initial pod count
      id: initial
      run: |
        INITIAL=$(kubectl get pods -n ${{ env.NAMESPACE }} -l app=products-service -q | wc -l)
        echo "products_pods=$INITIAL" >> $GITHUB_OUTPUT

    - name: Port forward to products service
      run: |
        kubectl port-forward -n ${{ env.NAMESPACE }} svc/products-service 3001:3001 > /dev/null 2>&1 &
        sleep 5

    - name: Run load test with Apache Bench
      run: |
        ab -n 1000 -c 50 http://localhost:3001/api/products || true

    - name: Monitor autoscaling
      run: |
        echo "Initial pods: ${{ steps.initial.outputs.products_pods }}"
        echo "Monitoring HPA for 2 minutes..."
        for i in {1..12}; do
          echo "--- Check $i ---"
          kubectl get hpa -n ${{ env.NAMESPACE }}
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=products-service
          echo "Waiting 10 seconds..."
          sleep 10
        done

    - name: Get final pod count
      id: final
      run: |
        FINAL=$(kubectl get pods -n ${{ env.NAMESPACE }} -l app=products-service -q | wc -l)
        echo "products_pods=$FINAL" >> $GITHUB_OUTPUT

    - name: Generate report
      run: |
        echo "=== Autoscaling Test Report ===" > test-report.txt
        echo "Initial Pods: ${{ steps.initial.outputs.products_pods }}" >> test-report.txt
        echo "Final Pods: ${{ steps.final.outputs.products_pods }}" >> test-report.txt
        echo "" >> test-report.txt
        echo "HPA Status:" >> test-report.txt
        kubectl describe hpa products-service-hpa -n ${{ env.NAMESPACE }} >> test-report.txt
        cat test-report.txt

    - name: Upload report
      uses: actions/upload-artifact@v3
      with:
        name: autoscaling-report
        path: test-report.txt
